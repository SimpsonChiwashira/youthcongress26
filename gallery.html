<!DOCTYPE html>
<html>
<head>
<title>Gallery | ZCCEW Youth Congress 2026</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">
<style>
  #gallery {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 12px;
    align-items: stretch;
  }

  #gallery img {
    width: 100%;
    height: auto;
    object-fit: cover;
    border-radius: 10px;
    display: block;
  }
</style>
</head>
<body>

<header><h1>📸 Gallery</h1></header>

<nav>
  <a href="index.html">Home</a>
  <a href="schedule.html">Schedule</a>
  <a href="gallery.html">Gallery</a>
  <a href="resources.html">Resources</a>
  <a href="quiz.html">Activities</a>
</nav>

<div class="card">
  <h2>Event Moments From The Last Congress</h2>
  <p>Do you remember these moments?</p>

  <div id="gallery"></div>
</div>

<script>
  const gallery = document.getElementById('gallery');
  const photoCount = 18; // update this number to match how many images you have
  for (let i = 1; i <= photoCount; i++) {
    const img = document.createElement('img');
    img.src = `images/${i}.jpg`;
    img.style.width = '100%';
    gallery.appendChild(img);
  }
</script>

</body>
</html>
